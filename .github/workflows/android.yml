name: Android CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumentation-tests:
    if: github.event.pull_request.draft == false
    runs-on: [ self-hosted, Android ]

    steps:
      - name: Checkout the code
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ github.token }}
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Rust toolchain is required by the Gobley Cargo/UniFFI plugins (:CalendarKmpDav).
      # Ensures `cargo` is on PATH for the Gradle process and the targets are installed.
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin

      # Setup Gradle and run Build
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Stop any stale Gradle daemon so the build picks up the updated PATH (incl. cargo).
      - name: Stop stale Gradle daemons
        run: ./gradlew --stop

      - name: Clean build environment
        run: |
          ./gradlew clean
          rm -rf build CalendarCore/build CalendarKmpDav/build .gradle release
          rm -rf CalendarKmpDav/rust/caldav_bridge/target

      - name: Build with Gradle
        run: ./gradlew build

      # Run tests
      - name: Run Android Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Run iOS Unit tests
        run: ./gradlew iosSimulatorArm64Test --stacktrace
