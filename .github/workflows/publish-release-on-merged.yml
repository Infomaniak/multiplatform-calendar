name: Publish Release on Merged

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  prepare:
    name: Undraft GitHub Release
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: [ self-hosted, Android ]
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Extract version from branch name
        id: version
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "version=${BRANCH#release/}" >> $GITHUB_OUTPUT

      - name: Publish draft release
        run: gh release edit "${{ steps.version.outputs.version }}" --draft=false --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-android:
    name: Publish Android release to Maven Central
    needs: prepare
    permissions: {}
    uses: ./.github/workflows/publish-to-maven-central.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PRIVATE_PASSWORD: ${{ secrets.GPG_PRIVATE_PASSWORD }}

  notify:
    name: Notify KChat
    needs: [ prepare, publish-android ]
    runs-on: ubuntu-latest
    steps:
      - name: Notify KChat
        env:
          KCHAT_KMP_WEBHOOK_URL: ${{ secrets.KCHAT_KMP_WEBHOOK_URL }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          RELEASE_URL="https://github.com/Infomaniak/multiplatform-calendar/releases/tag/$VERSION"
          curl -s -X POST "$KCHAT_KMP_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \":rocket: *Calendar lib $VERSION* is now available!\n:apple: SPM: \`.package(url: \\\"https://github.com/Infomaniak/multiplatform-calendar\\\", from: \\\"$VERSION\\\")\`\n:android: \`implementation(\\\"com.infomaniak.multiplatform_calendar:CalendarCore:$VERSION\\\")\`\n:link: $RELEASE_URL\"}"
