name: Publish Release on Merged

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  create-release:
    name: Publish draft GitHub Release and Android to Maven Central
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: [ self-hosted, Android ]

    steps:
      - name: Extract version from branch name
        id: version
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "version=${BRANCH#release/}" >> $GITHUB_OUTPUT

      - name: Publish draft release
        run: gh release edit "${{ steps.version.outputs.version }}" --draft=false --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout sources
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ steps.version.outputs.version }}
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic

      - name: Clean build environment
        run: |
          ./gradlew clean
          rm -rf build CalendarCore/build CalendarKmpDav/build .gradle
          rm -rf CalendarKmpDav/rust/caldav_bridge/target

      - name: Publish Android release to Maven Central
        run: ./gradlew publishAggregationToCentralPortal -Pcore.version=${{ steps.version.outputs.version }}

      - name: Notify KChat
        env:
          KCHAT_KMP_WEBHOOK_URL: ${{ secrets.KCHAT_KMP_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_URL="https://github.com/Infomaniak/multiplatform-calendar/releases/tag/$VERSION"
          curl -s -X POST "$KCHAT_KMP_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \":rocket: *Calendar lib $VERSION* is now available!\n:apple: SPM: \`.package(url: \\\"https://github.com/Infomaniak/multiplatform-calendar\\\", from: \\\"$VERSION\\\")\`\n:android: \`implementation(\\\"com.infomaniak.multiplatform_calendar:CalendarCore:$VERSION\\\")\`\n:link: $RELEASE_URL\"}"

    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx5g -Dfile.encoding=UTF-8"
      ossrhUsername: ${{ secrets.SONATYPE_USERNAME }}
      ossrhPassword: ${{ secrets.SONATYPE_PASSWORD }}
      GPG_key_id: ${{ secrets.GPG_KEY_ID }}
      GPG_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_private_password: ${{ secrets.GPG_PRIVATE_PASSWORD }}
