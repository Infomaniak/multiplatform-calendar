# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions
name: Publish to Maven Central
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (x.x.x)'
        required: true
        type: string
      acknowledgement:
        description: |
          WARNING: Publishing a version to Maven Central is irrevocable.
          Do you confirm (Yes/no):
          1. You have successfully tested publishing snapshot (with a Gradle CLEAN) just before changing the version
          2. The version is CORRECT, and is NOT a SNAPSHOT
          3. The iOS release has already been published
          4. You are pointing this workflow run to the tag that matches the version
          5. You are not drunk or otherwise too tired
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to release (x.x.x)'
        required: true
        type: string
    secrets:
      SONATYPE_USERNAME:
        required: true
      SONATYPE_PASSWORD:
        required: true
      GPG_KEY_ID:
        required: true
      GPG_PRIVATE_KEY:
        required: true
      GPG_PRIVATE_PASSWORD:
        required: true

jobs:
  build:
    runs-on: [ self-hosted, Android ]
    steps:
      - name: Check acknowledgement
        # Only required when triggered manually — skipped when called from another workflow.
        if: github.event_name == 'workflow_dispatch'
        run: test "${{ github.event.inputs.acknowledgement }}" = "Yes" || (echo "Acknowledgement missing" && exit 1)
      - name: Checkout sources
        uses: actions/checkout@v6.0.3
        with:
          submodules: recursive
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic
      - name: Perform a Gradle clean
        run: |
          ./gradlew clean
          # Cargo's target dir is not cleaned by Gradle — remove it to avoid stale Rust artifacts.
          rm -rf CalendarKmpDav/rust/caldav_bridge/target
      - name: Publish the artifacts
        run: ./gradlew publishAggregationToCentralPortal -Pcore.version=${{ inputs.version }}
env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx5g -Dfile.encoding=UTF-8"
  ossrhUsername: ${{ secrets.SONATYPE_USERNAME }}
  ossrhPassword: ${{ secrets.SONATYPE_PASSWORD }}
  GPG_key_id: ${{ secrets.GPG_KEY_ID }}
  GPG_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
  GPG_private_password: ${{ secrets.GPG_PRIVATE_PASSWORD }}
