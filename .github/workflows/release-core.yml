name: Release Core

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (x.x.x)'
        required: true
        type: string

jobs:
  build-xcframework:
    name: Build iOS XCFramework release
    runs-on: [ self-hosted, Android ]
    permissions:
      contents: write
      pull-requests: write
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Validate version format
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be in x.x.x format"
            exit 1
          fi

      - name: Checkout the code
        uses: actions/checkout@v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Setup gh CLI
        run: command -v gh >/dev/null 2>&1 || brew install gh

      - name: Close existing release PRs, delete draft releases, and prune release branches
        run: |
          gh pr list --base main --state open --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("release/")) | [.number, .headRefName] | @tsv' \
            | while IFS=$'\t' read -r PR_NUMBER BRANCH; do
                gh pr close "$PR_NUMBER" --comment "Superseded by a new release workflow run."
                VERSION_TO_DELETE="${BRANCH#release/}"
                gh release delete "$VERSION_TO_DELETE" --yes || true
              done
          git ls-remote --heads origin 'refs/heads/release/*' \
            | awk '{ sub("refs/heads/","",$2); print $2 }' \
            | while IFS= read -r branch; do git push origin --delete "$branch" || true; done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,aarch64-apple-darwin

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2.4.0

      - name: Clean build environment
        run: |
          ./gradlew clean
          rm -rf build CalendarCore/build CalendarKmpDav/build .gradle release
          rm -rf CalendarKmpDav/rust/caldav_bridge/target

      - name: Build XCFramework
        run: ./gradlew :CalendarCore:assembleMultiplatformCalendarReleaseXCFramework -PrustNativeRelease=true

      - name: Strip debug symbols from XCFramework slices
        run: |
          find CalendarCore/build/XCFrameworks/release/MultiplatformCalendar.xcframework -type f -name 'MultiplatformCalendar' | while read -r slice; do
            strip -S "$slice"
            ranlib "$slice" >/dev/null 2>&1 || true
          done

      - name: Archive XCFramework
        run: |
          mkdir -p release
          (
            cd CalendarCore/build/XCFrameworks/release || exit 1
            zip -r ../../../../release/MultiplatformCalendar.xcframework.zip MultiplatformCalendar.xcframework
          )

      - name: Update Package.swift with checksum
        run: |
          CHECKSUM=$(swift package compute-checksum release/MultiplatformCalendar.xcframework.zip)
          URL="https://github.com/Infomaniak/multiplatform-calendar/releases/download/$VERSION/MultiplatformCalendar.xcframework.zip"
          perl -0777 -pi -e "s|url: \".*MultiplatformCalendar.xcframework.zip\",(\s*)checksum: \".*\"|url: \"$URL\",\1checksum: \"$CHECKSUM\"|g" Package.swift

#      - name: Import bot's GPG key for signing commits
#        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
#        with:
#          gpg_private_key: ${{ secrets.BOT_MOBILE_GPG_PRIVATE_KEY }}
#          passphrase: ${{ secrets.BOT_MOBILE_GPG_PASSPHRASE }}
#          git_config_global: true
#          git_user_signingkey: true
#          git_commit_gpgsign: true

      - name: Commit Package.swift and push release branch
        run: |
          BRANCH="release/$VERSION"
          git config user.name "dev-mobile-bot"
          git config user.email "mobile+github-bot@infomaniak-dev.ch"
          git checkout -b "$BRANCH"
          git add Package.swift
          git commit -m "chore: Update Package.swift for release $VERSION"
          git push origin "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft GitHub Release and upload asset
        run: |
          gh release create "$VERSION" \
            release/MultiplatformCalendar.xcframework.zip \
            --title "MultiplatformCalendar $VERSION" \
            --generate-notes \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-snapshot-android:
    name: Publish Android snapshot to Maven Central
    uses: ./.github/workflows/publish-to-maven-central-snapshots.yml
    with:
      version: ${{ inputs.version }}-SNAPSHOT
    secrets:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PRIVATE_PASSWORD: ${{ secrets.GPG_PRIVATE_PASSWORD }}

  open-release-pr:
    name: Open release PR
    needs: [ build-xcframework, publish-snapshot-android ]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Open release PR
        run: |
          VERSION="${{ inputs.version }}"
          gh pr create \
            --title "chore: Release $VERSION" \
            --body "Update \`Package.swift\` with the new XCFramework URL and checksum for version \`$VERSION\`. Merging this PR will automatically publish the GitHub Release and the Android library on Maven Central." \
            --head "release/$VERSION" \
            --base main \
            --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
