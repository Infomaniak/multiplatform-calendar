[package]
name = "caldav_bridge"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["staticlib", "cdylib"]

[dependencies]
fast-dav-rs = "0.4"
hyper-util = "0.1"
bytes = "1"
http = "1"
uuid = { version = "1", features = ["v4"] }
uniffi = { version = "0.29", features = ["tokio"] }
thiserror = "2"
icalendar = { version = "0.17.10", features = ["parser"] }
roxmltree = "0.21"

[profile.release]
lto = true
opt-level = "s"
# `"debuginfo"` (not `true`/`"symbols"`) keeps the export table so uniffi-bindgen can read the
# library symbols when bindings are generated from a release .so. AGP strips again at packaging.
strip = "debuginfo"
